<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card">
    <h1 class="title">My Tasks</h1>

    <div class="input-row">
      <label for="taskInput" class="visually-hidden">New task</label>
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="New task..."
      >
      <button id="addBtn" class="add-btn">Add</button>
    </div>

    <ul id="taskList" class="task-list">
      <!-- Task items are rendered by script.js -->
    </ul>

    <p id="taskCounter" class="task-counter">0 of 0 tasks done</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
